<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاريعنا الكبرى</title>
    <style>
        :root { --main: #003366; --accent: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f9; text-align: center; }
        nav { background: var(--main); padding: 15px; border-bottom: 3px solid var(--accent); display: flex; justify-content: center; flex-wrap: wrap; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; margin: 5px 15px; text-decoration: none; font-weight: bold; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .gallery img { width: 100%; height: 350px; object-fit: cover; border-radius: 15px; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="windows.html">الشبابيك</a>
        <a href="doors.html">الأبواب</a>
        <a href="projects.html" style="color:var(--accent)">المشاريع</a>
        <a href="reviews.html">الآراء</a>
    </nav>
    <h1 style="color: var(--main); margin-top: 30px;">سجل مشاريعنا المميزة</h1>
    <div class="gallery" id="proj-gal"></div>
    <script>
        const gal = document.getElementById('proj-gal');
        for(let i=1; i<=10; i++){
            let img = document.createElement('img');
            img.src = 'images/p' + i + '.JPG'; // ابحث عن p1.JPG, p2.JPG...
            img.onerror = function(){this.style.display='none'};
            gal.appendChild(img);
        }
    </script>
</body>
</html>
